<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Vorschau mit Notizfeld</title>
    <!-- Verlinke die externe CSS-Datei -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Charakter</h1>
    <input type="file" id="pdfUpload" accept="application/pdf">
    <div class="container">
        <!-- PDF Container (Left) -->
        <div class="pdf-container">
            <embed id="pdfViewer" type="application/pdf">
        </div>
        
        <!-- Right Side Container (Checkboxes + Quest Log) -->
        <div>
            <!-- Charakterstatus Header über dem gesamten Container -->
            <div class="charakterstatus-header"></div>
            
            <!-- Tabellencontainer für die Charakterdaten -->
            <div class="checkbox-container">
                <table>
                    <tr>
                        <th>Gesundheit</th>
                        <td><input type="number" class="maxValue" value="6" min="0"></td>
                        <td class="checkbox-container"></td>
                    </tr>
                    <tr>
                        <th>Willenskraft</th>
                        <td><input type="number" class="maxValue" value="4" min="0"></td>
                        <td class="checkbox-container"></td>
                    </tr>
                    <tr>
                        <th>Menschlichkeit</th>
                        <td><input type="number" class="maxValue" value="5" min="0"></td>
                        <td class="checkbox-container"></td>
                    </tr>
                    <tr>
                        <th>Hunger</th>
                        <td><input type="number" class="maxValue" value="5" min="0"></td>
                        <td class="checkbox-container"></td>
                    </tr>
                    <tr>
                        <th>Resonanz</th>
                        <td><input type="text" class="maxValue" value="" min=""></td>
                        <td class="checkbox-container">
                            <!-- Hier werden jetzt immer 3 feste Checkboxen für Resonanz hinzugefügt -->
                            <div class="checkbox" data-state="0"></div>
                            <div class="checkbox" data-state="0"></div>
                            <div class="checkbox" data-state="0"></div>
                        </td>
                    </tr>
                </table>
            </div>

            <!-- Quest Log Section (Rechts unter Charakterstatus) -->
            <div class="notiz-container">
                <h2>Quest Log</h2>
                <textarea id="questLog" placeholder="Schreibe hier deine Notizen..." oninput="autoResize(this)"></textarea>
            </div>
        </div>
    </div>

    <!-- Verlinke die externe JavaScript-Datei -->
    <script src="logic.js"></script>
</body>
</html>
